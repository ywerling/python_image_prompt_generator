<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    {% block styles %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito+Sans:300,400,700" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,700" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    {% endblock %}

    <title>{% block title %}AI Image Prompt Generator{% endblock %}</title>
  </head>
  <body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-promptcraft px-4">
      <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
        <i class="fa fa-image me-2"></i>PromptCraft AI
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('prompt_generator') }}">Generator</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('style_explorer') }}">Styles</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('prompt_enhancer') }}">Enhancer</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('template_builder') }}">Templates</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('prompt_library') }}">Library</a></li>
        </ul>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
